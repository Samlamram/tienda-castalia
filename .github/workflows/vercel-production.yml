name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_DEPLOY_AUT }}"
        env:
          VERCEL_ORG_ID: team_PILaJ5yiUDF4h6qWxqqXh6zc
          VERCEL_PROJECT_ID: prj_P5D9R0hZrt6v92ncX7N9C4zm6C2J

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_DEPLOY_AUT }}"
        env:
          VERCEL_ORG_ID: team_PILaJ5yiUDF4h6qWxqqXh6zc
          VERCEL_PROJECT_ID: prj_P5D9R0hZrt6v92ncX7N9C4zm6C2J

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_DEPLOY_AUT }}"
        env:
          VERCEL_ORG_ID: team_PILaJ5yiUDF4h6qWxqqXh6zc
          VERCEL_PROJECT_ID: prj_P5D9R0hZrt6v92ncX7N9C4zm6C2J
